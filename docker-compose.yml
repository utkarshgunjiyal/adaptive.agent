# Runner.ai — full Docker Compose stack.
#
# Brings up the "production" architecture Runner.ai targets: Postgres,
# Redis, Qdrant, MinIO, the backend API, a Celery worker for ingestion,
# and the frontend served by nginx.
#
# The K8s preview build uses a simplified stack (MongoDB + in-process
# background tasks + in-memory vector store) and does NOT use this file.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runner}
      POSTGRES_DB: ${POSTGRES_DB:-runner_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runner}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-runneradmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-runnersecret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  # Create the bucket on startup.
  minio_init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-runneradmin} ${MINIO_SECRET_KEY:-runnersecret};
      mc mb --ignore-existing local/${MINIO_BUCKET:-runner-uploads};
      exit 0;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio_init:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-runner}:${POSTGRES_PASSWORD:-runner}@postgres:5432/${POSTGRES_DB:-runner_ai}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-runner_chunks}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-runneradmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-runnersecret}
      MINIO_BUCKET: ${MINIO_BUCKET:-runner-uploads}
      MINIO_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-5.2}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8001:8001"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "app.worker", "worker", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio_init:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-runner}:${POSTGRES_PASSWORD:-runner}@postgres:5432/${POSTGRES_DB:-runner_ai}
      CELERY_BROKER_URL: redis://redis:6379/1
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-runner_chunks}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-runneradmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-runnersecret}
      MINIO_BUCKET: ${MINIO_BUCKET:-runner-uploads}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-5.2}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8001

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
