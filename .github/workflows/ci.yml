name: CI

on:
  push:
    branches: [main, master, v2-autonomous-platform]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import/compile check
        run: python -m compileall app

      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend (test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build
        run: npm run build

  containers:
    name: Docker build + compose + proxy validate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      DOMAIN: demo.example.com
      TLS_EMAIL: ci@example.com
      CORS_ORIGINS: https://demo.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose configs (dev / prod / demo)
        run: |
          docker compose config >/dev/null
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/dev/null
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.demo.yml config >/dev/null

      - name: Validate Caddy reverse-proxy config
        run: |
          docker run --rm \
            -e DOMAIN -e TLS_EMAIL \
            -e BACKEND_UPSTREAM=backend:8000 -e FRONTEND_UPSTREAM=frontend:80 \
            -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -v "$PWD/deploy/auth.conf:/etc/caddy/auth.conf:ro" \
            caddy:2.8-alpine caddy validate --config /etc/caddy/Caddyfile

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: runner-ai-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: runner-ai-frontend:ci
