# Optional private-demo authentication (Phase 42B, Option C).
#
# This file is imported inside the Caddy site block. By DEFAULT it is empty
# (comments only) → no proxy-level authentication, and access control relies on
# the application (real auth in production, or the startup guard refusing a
# silent dev_user boot).
#
# For a PRIVATE interview demo, lock the whole site behind HTTP basic auth so
# only you can reach it, while the app runs the (development-only) auth stub:
#
#   1. Generate a bcrypt hash for your chosen password:
#        docker run --rm caddy caddy hash-password --plaintext 'YOUR_PASSWORD'
#   2. Uncomment and fill in the block below (username + the hash from step 1):
#
# basic_auth {
# 	demo JHI...bcrypt-hash-here...
# }
#
# Then reload Caddy: `docker compose ... exec caddy caddy reload --config /etc/caddy/Caddyfile`.
#
# NOTE: basic_auth protects the demo from casual access; it is NOT a substitute
# for real application authentication before public multi-user use. See
# docs/SECURITY.md.
